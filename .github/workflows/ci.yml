name: CI

on:
  push:
  pull_request:

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Tests + GTO parity gate
        # `npm test` runs the unit tests, the parser checks, and the parity gate
        # (in-engine solver vs committed golden references — fails on any drift).
        run: npm test

      - name: Build extension bundles
        run: npm run build
